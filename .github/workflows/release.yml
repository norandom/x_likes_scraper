name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # required by softprops/action-gh-release to create the release

jobs:
  release:
    name: build + publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Create Dagger driver venv
        run: |
          uv venv --python 3.12 .venv-dagger
          uv pip install --python .venv-dagger/bin/python dagger-io anyio

      - name: Run Dagger build pipeline
        uses: dagger/dagger-for-github@v7
        with:
          verb: run
          args: .venv-dagger/bin/python ci/build.py
          version: latest

      - name: Verify tag matches pyproject version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg=$(grep -m1 '^version' pyproject.toml | sed -E 's/version *= *"([^"]+)"/\1/')
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match pyproject version $pkg" >&2
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
